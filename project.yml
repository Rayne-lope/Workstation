name: Workstation

options:
  bundleIdPrefix: local

settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: 15.0
    SWIFT_VERSION: 6.0
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO

targets:
  Workstation:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Sources/BeadsContract
      - path: Sources/BeadsWorkspace
      - path: assets
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: local.beads.workstation
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Workstation
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_NSAppleEventsUsageDescription: "This application needs permission to control Terminal to run local agent tasks."
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1
